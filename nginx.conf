# ProClean Rouen — Nginx reverse proxy configuration
# Copier dans /etc/nginx/sites-available/societe-nettoyage-rouen.fr
# Puis : ln -s /etc/nginx/sites-available/societe-nettoyage-rouen.fr /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS + www → non-www
server {
    listen 80;
    server_name societe-nettoyage-rouen.fr www.societe-nettoyage-rouen.fr;
    return 301 https://societe-nettoyage-rouen.fr$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.societe-nettoyage-rouen.fr;

    ssl_certificate /etc/letsencrypt/live/societe-nettoyage-rouen.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/societe-nettoyage-rouen.fr/privkey.pem;

    return 301 https://societe-nettoyage-rouen.fr$request_uri;
}

server {
    listen 443 ssl http2;
    server_name societe-nettoyage-rouen.fr;

    # SSL (Let's Encrypt / Plesk)
    ssl_certificate /etc/letsencrypt/live/societe-nettoyage-rouen.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/societe-nettoyage-rouen.fr/privkey.pem;

    # Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Reverse proxy → Next.js (PM2 port 3001)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache statique Next.js (1 an, immutable)
    location /_next/static {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache images (30 jours)
    location /images {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=2592000";
    }
}
